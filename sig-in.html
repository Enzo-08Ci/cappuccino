<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/Messi.jpg">
    <title>Messi</title>
</head>
<body>

    <form action="#" method="get">
            <p>
                Seu nome:
                <input type="text" name="nome">
            </p>

            <p>
                Seu Email:
                <input type="email" name="email">
            </p>

            <p>
                Data de nascimento:
                <input type="date" name="data">
            </p>

            <p>
                Crie uma senha:
                <input type="password" name="senha">
            </p>

            <p>
                Repita a senha:
                <input type="password" name="confirmar_senha">
            </p>

            <p>
                Telefone:
                <input type="number" name="número pessoal">
            </p>
                Tipo:
                <input type="radio" id="aluno" name="tipo" value="Aluno"> &nbsp;  
                <label for="aluno">Aluno</label>
                <input type="radio" id="instrutor" name="tipo" value="Instrutor">
                <label for="instrutor">Instrutor</label>
             </p>
        
        


            
                        

    
</body>
</html>
